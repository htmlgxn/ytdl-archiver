[tool.poetry]
name = "ytdl-archiver"
version = "2.0.0"
description = "Modern YouTube playlist archiver with media server metadata support"
authors = ["Ben Chitty <htmlgxn@protonmail.com>"]
readme = "README.md"
license = "MIT"
homepage = "https://github.com/htmlgxn/ytdl-archiver"
repository = "https://github.com/htmlgxn/ytdl-archiver"
keywords = ["youtube", "archiver", "media-server", "jellyfin", "emby"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: End Users/Desktop",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Video",
    "Topic :: System :: Archiving",
]
packages = [{include = "ytdl_archiver", from = "src"}]

[tool.poetry.scripts]
ytdl-archiver = "ytdl_archiver.cli:main"

[tool.poetry.dependencies]
python = "^3.10"
yt-dlp = "^2025.11.12"
yt-dlp-ejs = "0.3.1"
toml = "^0.10.2"
structlog = "^24.2.0"
tenacity = "^9.0.0"
click = "^8.1.7"
pathvalidate = "^3.0.0"


[tool.poetry.group.dev.dependencies]
pytest = "^8.3.0"
pytest-cov = "^6.0.0"
pytest-mock = "^3.14.0"
black = "^24.10.0"
isort = "^5.13.0"
flake8 = "^7.1.0"
mypy = "^1.13.0"
pre-commit = "^4.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'

[tool.isort]
profile = "black"
multi_line_output = 3

[tool.mypy]
python_version = "3.9"
warn_return_any = true
strict_optional = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=src/ytdl_archiver --cov-report=html --cov-report=term-missing"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]

[tool.coverage.run]
source = ["src/ytdl_archiver"]
omit = ["*/tests/*", "*/test_*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]